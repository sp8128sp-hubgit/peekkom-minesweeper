<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width" />
        <title>H&M 전빼꼼ZARA 몰래 찾기</title>
        <style>
            html {
                background: #f7f3e8;
            }

            canvas {
                background: grey;
                display: none;
                height: auto;
                margin: 16px auto 0;
                max-width: 100%;
                touch-action: none;
            }

            body {
                color: #2b241f;
                font-family: Arial, sans-serif;
                font-size: 20px;
                margin: 0;
                padding: 20px 12px 32px;
                text-align: center;
            }

            h1 {
                font-size: clamp(30px, 8vw, 56px);
                line-height: 1.1;
                margin: 16px 0 6px;
            }

            .subtitle {
                color: #6f665e;
                font-size: 14px;
                margin: 0 0 8px;
            }

            .peekkom-title {
                display: block;
                margin: 6px auto 12px;
                width: clamp(72px, 18vw, 108px);
            }

            .difficulty-note {
                color: #5d554e;
                font-size: 15px;
                line-height: 1.5;
                margin: 8px 0 14px;
            }

            .settings {
                line-height: 2;
                margin: 8px 0 14px;
            }

            .howto {
                line-height: 1.6;
                margin: 12px 0 18px;
            }

            button {
                background: #f4cf64;
                border: 2px solid #2b241f;
                font-size: 26px;
                padding: 12px 28px;
                border-radius: 10px;
                cursor: pointer;
            }

            input, select { font-size: 20px; }

            @media (max-width: 520px) {
                body {
                    font-size: 17px;
                    padding-top: 10px;
                }

                button {
                    font-size: 22px;
                    padding: 10px 24px;
                }

                input, select {
                    font-size: 18px;
                }
            }
        </style>
    </head>
    <body>
            <h1>H&M 전빼꼼ZARA 몰래 찾기</h1>
            <div class="subtitle">by 이음 프로젝트</div>
            <img class="peekkom-title" src="assets/peekkomnuki.png" alt="빼꼼이">
            난이도를 골라주세요:
            <select id="menu" name="menu" onchange="menu()">
              <option value="easy">쉬움</option>
              <option value="medium">보통</option>
              <option value="hard">어려움</option>
              <option value="custom">직접 정하기</option>
            </select><br>
            <div class="difficulty-note">
                쉬움: 작은 판 / 보통: 중간 판 / 어려움: 조금 큰 판
            </div>
            <div class="settings">
                가로 칸: <input id="cols" name="cols" type="text" size="2" disabled>
                세로 칸: <input id="rows" name="rows" type="text" size="2" disabled>
                숨어있는 빼꼼이: <input id="mines" name="mines" type="text" size="2" disabled>
            </div>
            <p class="howto">놀이 방법<br>
                클릭 또는 터치: 칸을 열어요.<br>
                오른쪽 클릭 또는 1초 터치: 빼꼼이가 있을 것 같은 칸을 표시하거나 지워요.<br>
                게임판 위쪽 얼굴 버튼을 누르면 다시 시작해요.</p>
            <button onclick="start(document.getElementById('menu'))">게임 시작</button>
            <canvas id="jsminesweeper"></canvas>
    </body>
    <script src="jsminesweeper.js"></script>
    <script language="JavaScript">
      function menu() {
          var elem = document.getElementById('menu');
          if (elem.options[elem.selectedIndex].value == "custom") {
              document.getElementById("cols").disabled = false;
              document.getElementById("rows").disabled = false;
              document.getElementById("mines").disabled = false;
          } else {
              document.getElementById("cols").disabled = true;
              document.getElementById("rows").disabled = true;
              document.getElementById("mines").disabled = true;
          }
      }
      function start(elem) {
          var cols = 0;
          var rows = 0;
          var mines = 0;
          var d = elem.options[elem.selectedIndex].value;
          switch(d) {
              case "easy":
                  cols = rows = 9; mines = 11;
                  break;
              case "medium":
                  cols = rows = 16; mines = 40;
                  break;
              case "hard":
                  cols = 16; rows = 20; mines = 70;
                  break;
              default:
                  cols = document.getElementById("cols").value;
                  rows = document.getElementById("rows").value;
                  mines = document.getElementById("mines").value;
          }
          width = (30*cols) + 20;
          height = (30*rows) + 220;

          var canvas = document.getElementById("jsminesweeper");
          canvas.width = width;
          canvas.height = height;
          canvas.style.display = "block";

          init();
          clearInterval(gametimer);
          numberofmines = 0;
          gametimer = null;
          timer = 0;
          end = false;
          win = false;
          endSoundPlayed = false;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          jsminesweeper(cols, rows, mines);
          canvas.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    </script>
</html>
